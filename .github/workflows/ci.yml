name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'  # 缓存依赖，后续运行速度提升3倍
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # 现在requirements.txt在根目录，不需要cd python
    
    - name: Create data directory
      run: mkdir -p data  # 提前创建数据库目录，避免初始化失败
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v  # 测试文件也在根目录的tests/